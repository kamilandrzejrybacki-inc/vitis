site_name: Vitis
site_description: Local PTY orchestrator for AI agent CLIs. Single-shot runs and multi-turn agent-to-agent conversations through Claude Code, Codex, and friends.
site_url: https://kamilandrzejrybacki-inc.github.io/vitis/
repo_url: https://github.com/kamilandrzejrybacki-inc/vitis
repo_name: kamilandrzejrybacki-inc/vitis
edit_uri: edit/main/docs/

docs_dir: docs

# Exclude the contributor-facing spec/plan/review docs from the published
# site entirely. They live in the repo for contributors but are not part of
# the user-facing documentation.
exclude_docs: |
  superpowers/
  requirements.txt

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Usage:
      - Single-shot runs: usage/run.md
      - Conversations: usage/converse.md
      - Cost and speed: usage/cost-and-speed.md
  - Reference:
      - Configuration: reference/configuration.md
  - Troubleshooting: troubleshooting.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kamilandrzejrybacki-inc/vitis
  generator: false

copyright: Built with MkDocs Material.
