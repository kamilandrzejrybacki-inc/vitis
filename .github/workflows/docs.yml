name: Publish Documentation

# Builds the MkDocs Material site from docs/ + the root README and publishes
# it to GitHub Pages on every push to main. Triggers manually via the
# workflow_dispatch event too, in case you want to republish without a code
# change.

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - README.md
      - .github/workflows/docs.yml
  workflow_dispatch:

# Allow only one concurrent docs deployment, queueing the latest run.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-based plugins (revision dates etc.)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - name: Install MkDocs Material + plugins
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build site
        run: mkdocs build --strict --verbose --site-dir _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
