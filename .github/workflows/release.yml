name: Release

# Builds the vitis binary for Linux + macOS (amd64 + arm64) on every tag push
# matching v*.*.*, attaches the artifacts to a GitHub Release, and generates a
# changelog from the commits since the previous tag.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (without leading v)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          binname="vitis"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            binname="vitis.exe"
          fi
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o "dist/${binname}" \
            ./cmd/vitis

      - name: Package archive
        run: |
          cd dist
          archive="vitis-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar czf "${archive}" vitis
          sha256sum "${archive}" > "${archive}.sha256"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitis-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        id: changelog
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          prev=$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || echo "")
          {
            echo "## Changes"
            echo
            if [ -n "$prev" ]; then
              echo "Commits from $prev to $tag:"
              echo
              git log --pretty=format:"- %s" "$prev..$tag"
            else
              echo "Initial release."
            fi
          } > /tmp/changelog.md
          {
            echo "changelog<<EOF"
            cat /tmp/changelog.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          generate_release_notes: false
